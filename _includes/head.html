<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />

  {%- assign canonical = page.canonical | default: page.url | absolute_url -%}
  <link rel="canonical" href="{{ canonical }}" />

  <!-- Open Graph -->
  <meta property="og:title" content="{{ page.og_title | default: page.title | default: site.title }}" />
  <meta property="og:description" content="{{ page.og_description | default: page.description | default: site.description }}" />
  <meta property="og:type" content="{{ page.og_type | default: 'website' }}" />
  <meta property="og:url" content="{{ canonical }}" />

  <!-- Optional: site-wide OG image -->
  {%- if page.og_image or site.og_image -%}
    <meta property="og:image" content="{{ page.og_image | default: site.og_image | absolute_url }}" />
  {%- endif -%}

  <!-- Optional: Twitter cards -->
  <meta name="twitter:card" content="{{ page.twitter_card | default: 'summary_large_image' }}" />
  <meta name="twitter:title" content="{{ page.og_title | default: page.title | default: site.title }}" />
  <meta name="twitter:description" content="{{ page.og_description | default: page.description | default: site.description }}" />
  {%- if page.og_image or site.og_image -%}
    <meta name="twitter:image" content="{{ page.og_image | default: site.og_image | absolute_url }}" />
  {%- endif -%}

  <!-- Styles -->
  <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}" />
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/favicon.png' | relative_url }}" />
</head>
